<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Find My Stuff Campus</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
        .admin-login {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        .admin-login h2 { margin-bottom: 24px; color: #0a5e56; }
        .admin-login input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        .admin-login button {
            width: 100%;
            padding: 12px;
            background: #0a5e56;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .admin-panel { display: none; padding: 24px; max-width: 1000px; margin: 0 auto; }
        .admin-header {
            background: #0a5e56;
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { margin: 0; font-size: 20px; }
        .admin-header button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .admin-section { margin-bottom: 40px; }
        .admin-section h2 {
            font-size: 18px;
            color: #0a5e56;
            border-bottom: 2px solid #0a5e56;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .admin-item {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .admin-item-info p { margin: 4px 0; font-size: 14px; color: #374151; }
        .admin-item-info strong { color: #111827; }
        .admin-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 16px;
        }
        .admin-item-left { display: flex; align-items: center; }
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .delete-btn:hover { background: #dc2626; }
        .no-items { color: #6b7280; font-size: 14px; }
        .error-msg { color: #ef4444; margin-top: 8px; font-size: 14px; }
    </style>
</head>
<body class="bodystyle">

<!-- LOGIN -->
<div class="admin-login" id="loginBox">
    <h2>🔐 Admin Panel</h2>
    <p style="color:#6b7280;margin-bottom:24px;font-size:14px;">Find My Stuff Campus</p>
    <input type="password" id="adminPassword" placeholder="Enter admin password">
    <button onclick="login()">Login</button>
    <p class="error-msg" id="loginError"></p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <div class="admin-header">
        <h1>🛠️ Admin Panel — Find My Stuff Campus</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="admin-panel">
        <div class="admin-section">
            <h2>🪪 Student Cards</h2>
            <div id="admin-student-cards"></div>
        </div>
        <div class="admin-section">
            <h2>🪪 ID Cards</h2>
            <div id="admin-id-cards"></div>
        </div>
        <div class="admin-section">
            <h2>🚗 Driver's Licenses</h2>
            <div id="admin-drivers-licenses"></div>
        </div>
        <div class="admin-section">
            <h2>💻 Devices</h2>
            <div id="admin-devices"></div>
        </div>
        <div class="admin-section">
            <h2>🎒 Other Items</h2>
            <div id="admin-items"></div>
        </div>
        <div class="admin-section">
            <h2>💳 Bank Cards</h2>
            <div id="admin-bank-cards"></div>
        </div>
    </div>
</div>

<script>
    const API = 'https://find-my-stuff-campus.onrender.com';
    let adminPassword = '';

    function login() {
        const input = document.getElementById('adminPassword').value;
        if (!input) return;
        adminPassword = input;
        loadAll();
    }

    function logout() {
        adminPassword = '';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('adminPassword').value = '';
    }

    async function loadAll() {
        try {
            const [studentCards, idCards, driversLicenses, devices, items, bankCards] = await Promise.all([
                fetch(`${API}/api/get-student-cards`).then(r => r.json()),
                fetch(`${API}/api/get-id-cards`).then(r => r.json()),
                fetch(`${API}/api/get-drivers-licenses`).then(r => r.json()),
                fetch(`${API}/api/get-devices`).then(r => r.json()),
                fetch(`${API}/api/get-items`).then(r => r.json()),
                fetch(`${API}/api/get-bank-cards`).then(r => r.json()),
            ]);

            // If password is wrong we'll catch it on first delete — just show the panel
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('loginError').textContent = '';

            renderSection('admin-student-cards', studentCards, 'student-card', item =>
                `<strong>${item.Surname_Initials}</strong> · Std No: ${item.Student_Number} · 📍 ${item.Location} · 📅 ${item.Date_Found || 'N/A'}`);

            renderSection('admin-id-cards', idCards, 'id-card', item =>
                `<strong>${item.Full_Name}</strong> · ID: ${item.ID_Number} · 📍 ${item.Location} · 📅 ${item.Date_Found || 'N/A'}`);

            renderSection('admin-drivers-licenses', driversLicenses, 'drivers-license', item =>
                `<strong>${item.Full_Name}</strong> · License: ${item.License_Number} · 📍 ${item.Location} · 📅 ${item.Date_Found || 'N/A'}`);

            renderSection('admin-devices', devices, 'device', item =>
                `<strong>${item.Device_Name}</strong> · ${item.Device_Type} · 📍 ${item.Location} · 📅 ${item.Date_Found || 'N/A'}`);

            renderSection('admin-items', items, 'item', item =>
                `<strong>${item.Item_Description}</strong> · ${item.Color} · 📍 ${item.Location} · 📅 ${item.Date_Found || 'N/A'}`);

            renderSection('admin-bank-cards', bankCards, 'bank-card', item =>
                `<strong>**** **** **** ${item.Card_Number.slice(-4)}</strong> · 📍 ${item.Location} · 📅 ${item.Date_Found || 'N/A'}`);

        } catch (err) {
            document.getElementById('loginError').textContent = 'Could not connect to server.';
        }
    }

    function renderSection(containerId, data, type, labelFn) {
        const container = document.getElementById(containerId);
        if (data.length === 0) {
            container.innerHTML = '<p class="no-items">No items found.</p>';
            return;
        }
        container.innerHTML = data.map(item => `
            <div class="admin-item" id="item-${item._id}">
                <div class="admin-item-left">
                    ${item.photo && item.photo.startsWith('http') ? `<img src="${item.photo}" alt="photo">` : ''}
                    <div class="admin-item-info">
                        <p>${labelFn(item)}</p>
                        <p style="color:#9ca3af;font-size:12px;">Added: ${new Date(item.timestamp).toLocaleDateString()}</p>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteItem('${type}', '${item._id}')">🗑 Delete</button>
            </div>
        `).join('');
    }

    async function deleteItem(type, id) {
        if (!confirm('Are you sure you want to delete this item?')) return;
        try {
            const res = await fetch(`${API}/api/admin/${type}/${id}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: adminPassword })
            });
            const data = await res.json();
            if (res.status === 401) {
                alert('Wrong password! Please logout and try again.');
                return;
            }
            document.getElementById(`item-${id}`).remove();
        } catch (err) {
            alert('Failed to delete item.');
        }
    }

    document.getElementById('adminPassword').addEventListener('keypress', e => {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
